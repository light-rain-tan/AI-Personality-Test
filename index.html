<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI型人格测试</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 16px;
}

/* ========== Container ========== */
.container {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  max-width: 640px;
  width: 100%;
  padding: 40px 32px;
  position: relative;
}

/* ========== Progress Bar ========== */
.progress-bar {
  width: 100%;
  height: 6px;
  background: #e8e8ed;
  border-radius: 3px;
  margin-bottom: 12px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4a90d9, #67b8f0);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-text {
  text-align: right;
  font-size: 13px;
  color: #86868b;
  margin-bottom: 32px;
}

/* ========== Screens ========== */
.screen { display: none; }
.screen.active { display: block; }

/* ========== Welcome Screen ========== */
.welcome-icon {
  font-size: 64px;
  text-align: center;
  margin-bottom: 20px;
}
.welcome-title {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.welcome-desc {
  font-size: 15px;
  color: #6e6e73;
  text-align: center;
  line-height: 1.7;
  margin-bottom: 32px;
}
.btn {
  display: inline-block;
  padding: 14px 48px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  background: #4a90d9;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  outline: none;
}
.btn:hover { background: #3a7bc8; }
.btn:active { transform: scale(0.97); }
.btn-center { display: flex; justify-content: center; }

/* ========== Question ========== */
.question-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 28px;
}
.scenario-tag {
  display: inline-block;
  background: #f0f5fc;
  color: #4a90d9;
  font-size: 13px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 6px;
  margin-bottom: 16px;
}
.options { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 16px 20px;
  font-size: 15px;
  line-height: 1.5;
  color: #1d1d1f;
  background: #fafafa;
  border: 1.5px solid #e8e8ed;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  outline: none;
}
.option-btn:hover { border-color: #4a90d9; background: #f5f9fd; }
.option-btn:active { background: #eef4fb; }
.option-btn.selected { border-color: #4a90d9; background: #e8f1fb; color: #2b6cb0; font-weight: 500; }

/* ========== Result Screen ========== */
.result-type-icon {
  font-size: 56px;
  text-align: center;
  margin-bottom: 12px;
}
.result-main-label {
  font-size: 15px;
  color: #86868b;
  text-align: center;
  margin-bottom: 8px;
}
.result-type-name {
  font-size: 36px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.result-badge {
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: #4a90d9;
  background: #f0f5fc;
  display: inline-block;
  padding: 4px 16px;
  border-radius: 6px;
  margin-bottom: 20px;
}
.result-badge-wrapper {
  text-align: center;
  margin-bottom: 20px;
}
.result-desc {
  font-size: 15px;
  color: #6e6e73;
  line-height: 1.8;
  margin-bottom: 36px;
  padding: 0 4px;
}

/* Percentage bars */
.percentage-section { margin-bottom: 32px; }
.percentage-title {
  font-size: 14px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.pct-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  gap: 12px;
}
.pct-label {
  font-size: 14px;
  font-weight: 500;
  min-width: 72px;
  white-space: nowrap;
}
.pct-bar-bg {
  flex: 1;
  height: 10px;
  background: #f0f0f3;
  border-radius: 5px;
  overflow: hidden;
}
.pct-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.8s ease;
}
.pct-value {
  font-size: 14px;
  font-weight: 600;
  min-width: 42px;
  text-align: right;
}

/* Result buttons */
.result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-secondary {
  display: inline-block;
  padding: 14px 32px;
  font-size: 15px;
  font-weight: 600;
  color: #4a90d9;
  background: transparent;
  border: 1.5px solid #4a90d9;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  outline: none;
}
.btn-secondary:hover { background: #f0f5fc; }

/* ========== History Panel ========== */
.history-section {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid #e8e8ed;
}
.history-title {
  font-size: 14px;
  font-weight: 600;
  color: #86868b;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: #fafafa;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 14px;
}
.history-type { font-weight: 600; }
.history-date { color: #86868b; font-size: 12px; }
.history-clear {
  font-size: 12px;
  color: #ff4d4f;
  cursor: pointer;
  background: none;
  border: none;
  margin-top: 8px;
}
.history-clear:hover { text-decoration: underline; }

/* Toast */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(0,0,0,0.78);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 480px) {
  body { padding: 0; }
  .container { border-radius: 0; min-height: 100vh; padding: 28px 20px; }
  .result-type-name { font-size: 28px; }
  .welcome-title { font-size: 24px; }
}
</style>

// ===================== STATE =====================
let currentQ = 0;
let scores = { doubao: 0, deepseek: 0, chatgpt: 0, claude: 0, gemini: 0 };
let selectedQuestions = [];

// ===================== FUNCTIONS =====================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  scores = { doubao: 0, deepseek: 0, chatgpt: 0, claude: 0, gemini: 0 };
  selectedQuestions = shuffleAndPick(ALL_QUESTIONS, 15);
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = selectedQuestions[currentQ];
  const total = selectedQuestions.length;

  // Progress
  document.getElementById('progress-fill').style.width = ((currentQ + 1) / total * 100) + '%';
  document.getElementById('progress-text').textContent = `第 ${currentQ + 1} / ${total} 题`;

  // Scenario + question
  document.getElementById('scenario-tag').textContent = q.scenario;
  document.getElementById('question-text').textContent = q.text;

  // Options
  const container = document.getElementById('options');
  container.innerHTML = '';
  q.answers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = ans.text;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(index) {
  const q = selectedQuestions[currentQ];
  const answerScores = q.answers[index].scores || {};
  TYPE_KEYS.forEach(k => {
    scores[k] += answerScores[k] || 0;
  });

  // Visual feedback
  const btns = document.querySelectorAll('.option-btn');
  btns[index].classList.add('selected');
  btns.forEach(b => b.style.pointerEvents = 'none');

  setTimeout(() => {
    currentQ++;
    if (currentQ < selectedQuestions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 350);
}

// ===================== RESULT LOGIC =====================

function getResultInfo() {
  const totalScore = TYPE_KEYS.reduce((sum, k) => sum + scores[k], 0);

  // Calculate percentages
  const percentages = {};
  TYPE_KEYS.forEach(k => {
    percentages[k] = totalScore > 0 ? Math.round(scores[k] / totalScore * 100) : 0;
  });

  // Sort types by score descending
  const sorted = TYPE_KEYS.slice().sort((a, b) => scores[b] - scores[a]);
  const top1 = sorted[0];
  const top2 = sorted[1];

  // Check for tie (difference <= 1)
  const diff = Math.abs(scores[top1] - scores[top2]);
  const isMixed = diff <= 1 && scores[top1] > 0;

  // Calculate intensity based on top type's score vs theoretical max
  // Max score per type: 15 questions * 3 pts = 45
  const MAX_SCORE = 45;
  const topScore = scores[top1];
  const intensityPct = MAX_SCORE > 0 ? (topScore / MAX_SCORE) * 100 : 0;
  let intensity = 'typical';
  if (intensityPct >= 60) intensity = 'heavy';
  else if (intensityPct < 40) intensity = 'light';

  let result = {};
  if (isMixed) {
    // Normalize pair key: always sort alphabetically for lookup
    const pair = [top1, top2].sort();
    const pairKey = pair[0] + '+' + pair[1];
    const mixed = MIXED_DESCS[pairKey];

    result = {
      isMixed: true,
      typeKeys: [top1, top2],
      name: TYPES[top1].name + ' + ' + TYPES[top2].name,
      icon: TYPES[top1].icon + ' ' + TYPES[top2].icon,
      coreDesc: mixed ? mixed.core : '',
      accentDesc: mixed ? mixed.accent : '',
      fullDesc: mixed ? mixed.full : '你是一个复合型人格，融合了两种独特的特质。',
      intensity,
      intensityKey: top1 + '_' + intensity
    };
  } else {
    const intensityLabel = intensity;
    result = {
      isMixed: false,
      typeKeys: [top1],
      name: TYPES[top1].name,
      icon: TYPES[top1].icon,
      intensity,
      intensityKey: top1 + '_' + intensityLabel
    };
  }
  result.percentages = percentages;
  result.sorted = sorted;
  return result;
}

function getResultDescription(info) {
  if (info.isMixed) {
    return info.fullDesc;
  }
  // Single type: look up intensity descriptor
  const key = info.intensityKey;
  if (INTENSITY_DESCS[key]) {
    return INTENSITY_DESCS[key];
  }
  // Fallback
  return TYPES[info.typeKeys[0]].desc;
}

function showResult() {
  const info = getResultInfo();
  const desc = getResultDescription(info);

  // Render result
  document.getElementById('result-icon').textContent = info.icon;
  document.getElementById('result-name').textContent = info.name;

  // Intensity badge
  const badgeEl = document.getElementById('result-badge');
  if (!info.isMixed) {
    const intensityLabels = { light: '轻度倾向', typical: '典型特征', heavy: '重度纯粹' };
    badgeEl.textContent = intensityLabels[info.intensity] || '';
    badgeEl.style.display = 'inline-block';
  } else {
    badgeEl.style.display = 'none';
  }
  document.getElementById('result-desc').textContent = desc;

  // Percentages
  const pctContainer = document.getElementById('percentages');
  pctContainer.innerHTML = '';
  TYPE_KEYS.forEach(key => {
    const type = TYPES[key];
    const pct = info.percentages[key];
    const row = document.createElement('div');
    row.className = 'pct-row';
    row.innerHTML = `
      <span class="pct-label">${type.icon} ${type.name.replace('型人格','')}</span>
      <div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${pct}%;background:${type.color}"></div></div>
      <span class="pct-value">${pct}%</span>
    `;
    pctContainer.appendChild(row);
  });

  // Save to history
  saveHistory(info.typeKeys[0], info.percentages, info.isMixed);

  showScreen('result-screen');
}

function shareResult() {
  const info = getResultInfo();
  const desc = getResultDescription(info);

  let text = `【AI型人格测试结果】\n\n`;
  text += `${info.icon} 我是「${info.name}」\n`;
  text += desc.substring(0, 60) + '…\n\n';
  text += '—— 人格占比 ——\n';
  TYPE_KEYS.forEach(key => {
    const type = TYPES[key];
    const pct = info.percentages[key];
    text += `${type.icon}${type.name.replace('型人格','')} ${pct}%\n`;
  });
  text += '\n来测测你的AI型人格吧！';

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('结果已复制到剪贴板 ✅'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('结果已复制到剪贴板 ✅');
  }
}

function retake() {
  currentQ = 0;
  scores = { doubao: 0, deepseek: 0, chatgpt: 0, claude: 0, gemini: 0 };
  selectedQuestions = [];
  showScreen('welcome-screen');
  renderHistory();
}

// ===================== HISTORY =====================

function saveHistory(dominant, percentages, isMixed) {
  let history = JSON.parse(localStorage.getItem('ai-personality-history') || '[]');
  history.unshift({
    date: new Date().toLocaleString('zh-CN'),
    dominant: dominant,
    percentages: percentages,
    scores: { ...scores },
    isMixed: !!isMixed
  });
  // Keep last 10
  if (history.length > 10) history = history.slice(0, 10);
  localStorage.setItem('ai-personality-history', JSON.stringify(history));
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('ai-personality-history') || '[]');
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = '';
  history.forEach(item => {
    const t = TYPES[item.dominant];
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <span class="history-type">${t.icon} ${t.name}</span>
      <span class="history-date">${item.date}</span>
    `;
    list.appendChild(div);
  });
}

function clearHistory() {
  localStorage.removeItem('ai-personality-history');
  renderHistory();
  showToast('历史记录已清除');
}

// ===================== TOAST =====================

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===================== INIT =====================
renderHistory();
